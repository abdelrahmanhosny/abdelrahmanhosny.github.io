---
layout: default
title: Blog
blog_nav: active
excerpt: Blog posts on whatever thoughts I feel like sharing.
---

<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>
    <div class="date">
    Written on {{ post.date | date: "%B %e, %Y" }}
  </div>
      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  {% endfor %}
</div>
