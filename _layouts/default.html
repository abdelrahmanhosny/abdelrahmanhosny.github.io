    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

<body>
    <div class="wrapper-masthead">
        <div class="container">
            <header class="masthead clearfix">
                <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" /></a>
                <div class="site-info">
                    <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
                    <p class="site-description">{{ site.description }}</p>
                </div>
                <nav> <a href="{{ site.baseurl }}/" class="{{ page.home_nav }}">Home</a> <a href="{{ site.baseurl }}/about" class="{{ page.about_nav }}">About</a> <a href="{{ site.baseurl }}/projects" class="{{ page.projects_nav }}">Projects</a> <a href="{{ site.baseurl }}/research" class="{{ page.research_nav }}">Research</a> <a href="{{ site.baseurl }}/teaching" class="{{ page.teaching_nav }}">Teaching</a> <a href="{{ site.baseurl }}/blog" class="{{ page.blog_nav }}">Blog</a> </nav>
            </header>
        </div>
    </div>
    <div id="main" role="main" class="container"> {{ content }} </div>
    <div class="wrapper-footer">
        <div class="container">
            <footer class="footer"> {% include svg-icons.html %} </footer>
        </div>
    </div> {% include analytics.html %} </body>
